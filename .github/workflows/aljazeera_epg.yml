name: AlJazeera EPG Update

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # استخدام git add . بدلاً من اسم الملف لتجنب خطأ pathspec
          git add . 
          # عمل commit فقط إذا كان هناك تغييرات فعلية
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update EPG Data" && git push)
